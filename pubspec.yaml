name: momokiki
description: Open source language learning app
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # State
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  hooks_riverpod: ^2.5.1

  # DI
  get_it: ^7.7.0
  injectable: ^2.4.4

  # Navigation
  go_router: ^14.2.7

  # Local DB
  drift: ^2.19.0
  drift_flutter: ^0.2.1
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3

  # Remote
  supabase_flutter: ^2.5.0
  dio: ^5.5.0
  retrofit: ^4.2.0

  # Code gen (annotations)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  fl_chart: ^0.68.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  iconsax_flutter: ^1.0.0
  ruby_text: ^3.0.0

  # Audio
  just_audio: ^0.9.40
  record: ^5.1.2
  speech_to_text: ^7.0.0

  # ML
  google_mlkit_translation: ^0.11.0

  # Utils
  string_similarity: ^2.1.1
  spaced_repetition: ^0.1.0
  shared_preferences: ^2.3.1
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  freezed: ^2.5.2
  riverpod_generator: ^2.4.3
  injectable_generator: ^2.6.2
  retrofit_generator: ^9.1.3
  drift_dev: ^2.19.0
  json_serializable: ^6.8.0
  mocktail: ^1.0.3
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/animations/
    - assets/fonts/
